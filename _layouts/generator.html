---
layout: default
---

<div class="generator">
    {% if page.image %}
    <div class="featuredImage">
        <img
            src="{{ '/assets/img/' | prepend: site.baseurl | append: page.image }}"
            alt=""
        />
    </div>
    {% endif %}
    <h1 class="generatorTitle">{{ title }}</h1>

    {{ content }}
</div>
